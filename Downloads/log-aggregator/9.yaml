  # ============================================================
  # 16. LAMBDA — S3 Notification Setup (Custom Resource)
  # ============================================================
  S3NotificationSetupLambda:
    Type: AWS::Lambda::Function
    DependsOn: S3NotificationLambdaLogGroup
    Properties:
      FunctionName: !Sub "log-aggregator-s3-notify-setup-${EnvironmentName}"
      Description: "One-time CFN custom resource: wires raw-logs S3 event to LogProcessorLambda"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt S3NotificationLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, json, urllib.request
          s3 = boto3.client("s3")
          def cfn_respond(event, context, status, reason="OK"):
              body = json.dumps({
                  "Status": status, "Reason": reason,
                  "PhysicalResourceId": event.get("PhysicalResourceId", context.log_stream_name),
                  "StackId": event["StackId"], "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
              }).encode()
              req = urllib.request.Request(url=event["ResponseURL"], data=body,
                                           headers={"Content-Type": ""}, method="PUT")
              urllib.request.urlopen(req)
          def handler(event, context):
              print(json.dumps(event))
              p      = event["ResourceProperties"]
              bucket = p["BucketName"]
              fn_arn = p["LambdaArn"]
              prefix = p.get("Prefix", "raw-logs/")
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket,
                          NotificationConfiguration={"LambdaFunctionConfigurations": [{
                              "LambdaFunctionArn": fn_arn,
                              "Events": ["s3:ObjectCreated:*"],
                              "Filter": {"Key": {"FilterRules": [{"Name": "prefix", "Value": prefix}]}}
                          }]}
                      )
                      print(f"Notification set: s3://{bucket}/{prefix}* -> {fn_arn}")
                  else:
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket, NotificationConfiguration={})
                      print(f"Notification cleared: s3://{bucket}")
                  cfn_respond(event, context, "SUCCESS")
              except Exception as e:
                  print(f"ERROR: {e}")
                  cfn_respond(event, context, "FAILED", str(e))

  # ============================================================
  # 17. CODEBUILD PROJECT
  #
  #  Updated buildspec:
  #  - Builds all 4 Docker images (app, dashboard, chatbot, dummy-app)
  #  - Packages log processor Lambda (with Conversion modules)
  #  - Packages ALL 5 action Lambdas individually from lambda/*.py
  #  - Deploys all 6 Lambda functions via update-function-code
  #  - Force-redeploys all 4 ECS services
  # ============================================================
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "log-aggregator-build-${EnvironmentName}"
      Description: "Builds Docker images, packages all Lambdas, pushes to ECR, deploys ECS + Lambda"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - { Name: AWS_DEFAULT_REGION,    Value: !Ref AWS::Region }
          - { Name: AWS_ACCOUNT_ID,        Value: !Ref AWS::AccountId }
          - { Name: ECR_APP_URI,           Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-app-${EnvironmentName}" }
          - { Name: ECR_DASHBOARD_URI,     Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-dashboard-${EnvironmentName}" }
          - { Name: ECR_CHATBOT_URI,       Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-chatbot-${EnvironmentName}" }
          - { Name: ECR_DUMMY_APP_URI,     Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-${DummyAppServiceName}-${EnvironmentName}" }
          - { Name: ECS_CLUSTER_NAME,      Value: !Ref EcsCluster }
          - { Name: APP_SERVICE_NAME,      Value: !Sub "log-aggregator-app-svc-${EnvironmentName}" }
          - { Name: DASHBOARD_SERVICE_NAME, Value: !Sub "log-aggregator-dashboard-svc-${EnvironmentName}" }
          - { Name: CHATBOT_SERVICE_NAME,  Value: !Sub "log-aggregator-chatbot-svc-${EnvironmentName}" }
          - { Name: DUMMY_APP_SERVICE_NAME, Value: !Sub "${DummyAppServiceName}-svc-${EnvironmentName}" }
          - { Name: ARTIFACT_BUCKET,       Value: !Ref ArtifactBucket }
          - { Name: RAW_LOGS_BUCKET,       Value: !Ref RawLogsBucket }
          - { Name: PROCESSED_BUCKET,      Value: !Ref ProcessedLogsBucket }
          - { Name: LAMBDA_PROCESSOR_NAME, Value: !Ref LogProcessorLambda }
          - { Name: LAMBDA_SERVICENOW,     Value: !Ref ServiceNowLambda }
          - { Name: LAMBDA_SSL,            Value: !Ref SSLRemediationLambda }
          - { Name: LAMBDA_PASSWORD,       Value: !Ref PasswordResetLambda }
          - { Name: LAMBDA_DB,             Value: !Ref DBRemediationLambda }
          - { Name: LAMBDA_COMPUTE,        Value: !Ref ComputeRemediationLambda }
          - { Name: ENV_NAME,              Value: !Ref EnvironmentName }
      Source:
        Type: S3
        Location: !Sub "${S3SourceBucket}/${S3SourceKey}"
        BuildSpec: |
          version: 0.2

          env:
            variables:
              DOCKER_BUILDKIT: "1"

          phases:
            install:
              runtime-versions:
                python: "3.12"
              commands:
                - pip install --upgrade pip awscli --quiet

            pre_build:
              commands:
                - echo "=== Logging in to ECR ==="
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION |
                    docker login --username AWS --password-stdin
                    $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - export IMAGE_TAG=$(date +%Y%m%d%H%M%S)
                - echo "Image tag = $IMAGE_TAG"
                - ls -la
                - |
                  # Handle nested ZIP (e.g. if CodeBuild unpacks into a subdirectory)
                  if [ ! -f "dockerfiles/Dockerfile.app" ]; then
                    FOUND=$(find . -name "Dockerfile.app" | head -1)
                    if [ -n "$FOUND" ]; then
                      NESTED=$(dirname $(dirname $FOUND))
                      echo "Flattening from $NESTED..."
                      cp -r $NESTED/. .
                    fi
                  fi

            build:
              commands:
                # ── Docker images ────────────────────────────────────────────
                - echo "=== Building App image ==="
                - docker build --cache-from $ECR_APP_URI:latest
                    -f dockerfiles/Dockerfile.app
                    -t $ECR_APP_URI:$IMAGE_TAG -t $ECR_APP_URI:latest .

                - echo "=== Building Dashboard image ==="
                - docker build --cache-from $ECR_DASHBOARD_URI:latest
                    -f dockerfiles/Dockerfile.dashboard
                    -t $ECR_DASHBOARD_URI:$IMAGE_TAG -t $ECR_DASHBOARD_URI:latest .

                - echo "=== Building Chatbot image ==="
                - docker build --cache-from $ECR_CHATBOT_URI:latest
                    -f dockerfiles/Dockerfile.chatbot
                    -t $ECR_CHATBOT_URI:$IMAGE_TAG -t $ECR_CHATBOT_URI:latest .

                - echo "=== Building Dummy App image ==="
                - docker build --cache-from $ECR_DUMMY_APP_URI:latest
                    -f dockerfiles/Dockerfile.dummy-app
                    -t $ECR_DUMMY_APP_URI:$IMAGE_TAG -t $ECR_DUMMY_APP_URI:latest .

                # ── Lambda Processor (needs Conversion modules) ──────────────
                - echo "=== Packaging Lambda Processor ==="
                - rm -rf /tmp/lambda-processor && mkdir -p /tmp/lambda-processor
                - pip install -r Conversion/requirements.txt -t /tmp/lambda-processor/ --quiet 2>/dev/null || true
                - cp Conversion/log_parser.py          /tmp/lambda-processor/
                - cp Conversion/log_to_csv_service.py  /tmp/lambda-processor/
                - cp lambda/lambda_handler.py           /tmp/lambda-processor/
                - cd /tmp/lambda-processor
                - zip -r9q /tmp/lambda-processor.zip . -x "*.pyc" -x "__pycache__/*"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lambda-processor.zip s3://$RAW_LOGS_BUCKET/lambda/lambda-processor-$IMAGE_TAG.zip
                - aws s3 cp /tmp/lambda-processor.zip s3://$RAW_LOGS_BUCKET/lambda/lambda-processor-latest.zip

                # ── Action Lambda: ServiceNow ────────────────────────────────
                - echo "=== Packaging ServiceNow Lambda ==="
                - rm -rf /tmp/lam-snow && mkdir -p /tmp/lam-snow
                - cp lambda/servicenow_lambda_handler.py /tmp/lam-snow/
                - cd /tmp/lam-snow && zip -r9q /tmp/lam-servicenow.zip . -x "*.pyc"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lam-servicenow.zip s3://$RAW_LOGS_BUCKET/lambda/lam-servicenow-$IMAGE_TAG.zip

                # ── Action Lambda: SSL Remediation ───────────────────────────
                - echo "=== Packaging SSL Lambda ==="
                - rm -rf /tmp/lam-ssl && mkdir -p /tmp/lam-ssl
                - cp lambda/ssl_lambda_handler.py /tmp/lam-ssl/
                - cd /tmp/lam-ssl && zip -r9q /tmp/lam-ssl.zip . -x "*.pyc"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lam-ssl.zip s3://$RAW_LOGS_BUCKET/lambda/lam-ssl-$IMAGE_TAG.zip

                # ── Action Lambda: Password Reset ────────────────────────────
                - echo "=== Packaging Password Reset Lambda ==="
                - rm -rf /tmp/lam-pw && mkdir -p /tmp/lam-pw
                - cp lambda/password_reset_lambda_handler.py /tmp/lam-pw/
                - cd /tmp/lam-pw && zip -r9q /tmp/lam-password.zip . -x "*.pyc"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lam-password.zip s3://$RAW_LOGS_BUCKET/lambda/lam-password-$IMAGE_TAG.zip

                # ── Action Lambda: DB Remediation ────────────────────────────
                - echo "=== Packaging DB Lambda ==="
                - rm -rf /tmp/lam-db && mkdir -p /tmp/lam-db
                - cp lambda/db_lambda_handler.py /tmp/lam-db/
                - cd /tmp/lam-db && zip -r9q /tmp/lam-db.zip . -x "*.pyc"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lam-db.zip s3://$RAW_LOGS_BUCKET/lambda/lam-db-$IMAGE_TAG.zip

                # ── Action Lambda: Compute Remediation ───────────────────────
                - echo "=== Packaging Compute Lambda ==="
                - rm -rf /tmp/lam-compute && mkdir -p /tmp/lam-compute
                - cp lambda/compute_lambda_handler.py /tmp/lam-compute/
                - cd /tmp/lam-compute && zip -r9q /tmp/lam-compute.zip . -x "*.pyc"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/lam-compute.zip s3://$RAW_LOGS_BUCKET/lambda/lam-compute-$IMAGE_TAG.zip

            post_build:
              commands:
                # ── Push Docker images ───────────────────────────────────────
                - echo "=== Pushing Docker images ==="
                - docker push $ECR_APP_URI:$IMAGE_TAG       && docker push $ECR_APP_URI:latest
                - docker push $ECR_DASHBOARD_URI:$IMAGE_TAG && docker push $ECR_DASHBOARD_URI:latest
                - docker push $ECR_CHATBOT_URI:$IMAGE_TAG   && docker push $ECR_CHATBOT_URI:latest
                - docker push $ECR_DUMMY_APP_URI:$IMAGE_TAG && docker push $ECR_DUMMY_APP_URI:latest

                # ── Deploy Lambda Processor ──────────────────────────────────
                - echo "=== Deploying Lambda Processor ==="
                - aws lambda update-function-code
                    --function-name $LAMBDA_PROCESSOR_NAME
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lambda-processor-latest.zip
                - aws lambda wait function-updated --function-name $LAMBDA_PROCESSOR_NAME
                - echo "Lambda Processor updated"

                # ── Deploy Action Lambdas ────────────────────────────────────
                - echo "=== Deploying Action Lambdas ==="
                - aws lambda update-function-code
                    --function-name $LAMBDA_SERVICENOW
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lam-servicenow-$IMAGE_TAG.zip
                - aws lambda wait function-updated --function-name $LAMBDA_SERVICENOW

                - aws lambda update-function-code
                    --function-name $LAMBDA_SSL
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lam-ssl-$IMAGE_TAG.zip
                - aws lambda wait function-updated --function-name $LAMBDA_SSL

                - aws lambda update-function-code
                    --function-name $LAMBDA_PASSWORD
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lam-password-$IMAGE_TAG.zip
                - aws lambda wait function-updated --function-name $LAMBDA_PASSWORD

                - aws lambda update-function-code
                    --function-name $LAMBDA_DB
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lam-db-$IMAGE_TAG.zip
                - aws lambda wait function-updated --function-name $LAMBDA_DB

                - aws lambda update-function-code
                    --function-name $LAMBDA_COMPUTE
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/lam-compute-$IMAGE_TAG.zip
                - aws lambda wait function-updated --function-name $LAMBDA_COMPUTE

                - echo "=== All Lambdas deployed ==="

                # ── Redeploy ECS services ────────────────────────────────────
                - echo "=== Redeploying ECS services ==="
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $APP_SERVICE_NAME --force-new-deployment
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $DASHBOARD_SERVICE_NAME --force-new-deployment
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $CHATBOT_SERVICE_NAME --force-new-deployment
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $DUMMY_APP_SERVICE_NAME --force-new-deployment

                - echo "=== Build complete. Image tag = $IMAGE_TAG ==="

          cache:
            paths:
              - "/root/.cache/pip/**/*"

      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/codebuild/log-aggregator-${EnvironmentName}"
          StreamName: build

  # ============================================================
  # 18. SNS TOPIC
  # ============================================================
  SchedulerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "log-aggregator-scheduler-notify-${EnvironmentName}"
      DisplayName: "Log Aggregator Scheduler Alerts"

  # ============================================================
  # 19. LAMBDA — Scheduler
  # ============================================================
  SchedulerLambda:
    Type: AWS::Lambda::Function
    DependsOn: SchedulerLambdaLogGroup
    Properties:
      FunctionName: !Sub "log-aggregator-scheduler-${EnvironmentName}"
      Description: "EventBridge-triggered: starts CodeBuild and/or force-redeploys ECS"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaSchedulerRole.Arn
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          CODEBUILD_PROJECT_NAME: !Ref CodeBuildProject
          ECS_CLUSTER_NAME:       !Ref EcsCluster
          APP_SERVICE_NAME:       !Sub "log-aggregator-app-svc-${EnvironmentName}"
          DASHBOARD_SERVICE_NAME: !Sub "log-aggregator-dashboard-svc-${EnvironmentName}"
          CHATBOT_SERVICE_NAME:   !Sub "log-aggregator-chatbot-svc-${EnvironmentName}"
          SNS_TOPIC_ARN:          !Ref SchedulerNotificationTopic
          SCHEDULER_TARGET:       !Ref SchedulerTarget
      Code:
        ZipFile: |
          import os, json, boto3, traceback
          from datetime import datetime, timezone
          cb  = boto3.client("codebuild")
          ecs = boto3.client("ecs")
          sns = boto3.client("sns")
          PROJECT  = os.environ["CODEBUILD_PROJECT_NAME"]
          CLUSTER  = os.environ["ECS_CLUSTER_NAME"]
          SERVICES = [os.environ["APP_SERVICE_NAME"],
                      os.environ["DASHBOARD_SERVICE_NAME"],
                      os.environ["CHATBOT_SERVICE_NAME"]]
          SNS_ARN  = os.environ["SNS_TOPIC_ARN"]
          TARGET   = os.environ.get("SCHEDULER_TARGET", "CODEBUILD")
          def _now(): return datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")
          def start_codebuild():
              bid = cb.start_build(projectName=PROJECT)["build"]["id"]
              print(f"[CodeBuild] Started: {bid}")
              return bid
          def force_ecs_redeploy():
              out = []
              for svc in SERVICES:
                  try:
                      ecs.update_service(cluster=CLUSTER, service=svc, forceNewDeployment=True)
                      out.append(f"  OK  {svc}")
                  except Exception as e:
                      out.append(f"  ERR {svc}: {e}")
              return out
          def notify(subject, msg):
              try: sns.publish(TopicArn=SNS_ARN, Subject=subject, Message=msg)
              except Exception: print(f"[SNS] Failed: {traceback.format_exc()}")
          def handler(event, context):
              lines = [f"Scheduler ran at {_now()}", f"Target: {TARGET}", ""]
              try:
                  if TARGET in ("CODEBUILD", "BOTH"): lines.append(f"[CodeBuild] {start_codebuild()}")
                  if TARGET in ("ECS_REDEPLOY", "BOTH"): lines += ["[ECS] Redeploy:"] + force_ecs_redeploy()
              except Exception:
                  tb = traceback.format_exc()
                  lines.append(f"\nERROR:\n{tb}")
                  notify(f"[ALERT] Scheduler FAILED – {_now()}", "\n".join(lines))
                  raise
              notify(f"[OK] Scheduler completed – {_now()}", "\n".join(lines))
              return {"statusCode": 200, "body": "\n".join(lines)}

  SchedulerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SchedulerLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledBuildRule.Arn

  # ============================================================
  # 20. EVENTBRIDGE RULE
  # ============================================================
  ScheduledBuildRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "log-aggregator-build-schedule-${EnvironmentName}"
      Description: "Fires scheduler Lambda on configured schedule"
      State: !Ref SchedulerState
      ScheduleExpression: !Ref SchedulerExpression
      Targets:
        - Id: SchedulerLambdaTarget
          Arn: !GetAtt SchedulerLambda.Arn

# ──────────────────────────────────────────────────────────────────────────────
# OUTPUTS
# ──────────────────────────────────────────────────────────────────────────────
Outputs:

  AlbDns:
    Description: "ALB DNS name (HTTP) — use this until your custom domain is set up"
    Value: !Sub "http://${AppLoadBalancer.DNSName}"

  AlbDnsHttps:
    Description: "ALB HTTPS URL — only active after SSL cert is attached"
    Value: !Sub "https://${AppLoadBalancer.DNSName}"
    Condition: HasAcmCertificate

  CustomDomainHttpsUrl:
    Description: "Your custom domain HTTPS URL — live once DNS propagates"
    Value: !Sub "https://${DomainName}"
    Condition: HasDomainName

  DummyAppUrl:
    Description: "SSL Demo dashboard (index.html)"
    Value: !Sub "http://${AppLoadBalancer.DNSName}/dummy"

  DummyAppUrlHttps:
    Description: "SSL Demo dashboard over HTTPS"
    Value: !Sub "https://${AppLoadBalancer.DNSName}/dummy"
    Condition: HasAcmCertificate

  DashboardUrl:
    Value: !Sub "http://${AppLoadBalancer.DNSName}/dashboard"

  ChatbotUrl:
    Value: !Sub "http://${AppLoadBalancer.DNSName}/chatbot"

  AlbArn:
    Description: "ALB ARN — paste this into SSL Lambda DEMO_MODE=false env var ALB_ARN"
    Value: !GetAtt AppLoadBalancer.LoadBalancerArn

  AlbHostedZoneId:
    Description: "ALB canonical hosted zone ID — needed for Route 53 alias records in other stacks"
    Value: !GetAtt AppLoadBalancer.CanonicalHostedZoneID

  ArtifactBucketName:
    Description: "Upload your source ZIP here FIRST, then update S3SourceBucket parameter"
    Value: !Ref ArtifactBucket

  RawLogsBucketName:
    Description: "Dummy app ships logs here; Lambda processor reads them"
    Value: !Ref RawLogsBucket

  ProcessedLogsBucketName:
    Description: "Lambda writes CSV+JSON here; Dashboard reads from here"
    Value: !Ref ProcessedLogsBucket

  EcsClusterName:
    Value: !Ref EcsCluster

  CodeBuildProjectName:
    Description: "Run this CodeBuild project to build images + deploy all Lambdas"
    Value: !Ref CodeBuildProject

  LogProcessorLambdaName:
    Value: !Ref LogProcessorLambda

  SSLLambdaArn:
    Description: "SSL Lambda ARN — add to Bedrock ssl_remediation_action_group"
    Value: !GetAtt SSLRemediationLambda.Arn

  ServiceNowLambdaArn:
    Description: "ServiceNow Lambda ARN — add to Bedrock servicenow_action_group"
    Value: !GetAtt ServiceNowLambda.Arn

  PasswordResetLambdaArn:
    Value: !GetAtt PasswordResetLambda.Arn

  DBLambdaArn:
    Value: !GetAtt DBRemediationLambda.Arn

  ComputeLambdaArn:
    Value: !GetAtt ComputeRemediationLambda.Arn

  BedrockSecretArn:
    Description: "Update this with real Bedrock Agent ID + Alias ID after creating the agent"
    Value: !Ref BedrockSecret

  SSLCertSecretArn:
    Description: "SSL Lambda writes renewed cert ARN here — dummy app reads from here"
    Value: !Ref SSLCertSecret

  ServiceNowSecretArn:
    Description: "Update with real ServiceNow credentials (or leave for demo mode)"
    Value: !Ref ServiceNowSecret

  # ── ServiceNow flow reference ─────────────────────────────────────────────
  ServiceNowFlowNote:
    Description: >
      Dashboard ServiceNow flow:
      Step 1 - POST /api/create-snow-ticket  → Bedrock → servicenow_action_group:createIncident
      Step 2 - POST /api/fix-error           → Bedrock → ssl_remediation_action_group:remediateSSL
      Poll   - GET  /api/snow-ticket/<INC>   → Dashboard reads ServiceNow ticket state directly
    Value: "See STEPS.md for Bedrock agent setup and action group configuration"

  BedrockAgentPromptNote:
    Description: "Paste this instruction into your Bedrock agent (copy from orchestrator_agent_prompt.txt in source ZIP)"
    Value: "orchestrator_agent_prompt.txt is included in the source ZIP — paste its contents into Bedrock Agent > Instructions"